apiVersion: v1
kind: Namespace
metadata:
  name: dev-registry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: dev-registry
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: dev-registry
spec:
  replicas: 1
  selector: { matchLabels: { app: registry } }
  template:
    metadata: { labels: { app: registry } }
    spec:
      containers:
        - name: registry
          image: registry:2
          ports: [ { containerPort: 5000 } ]
          env:
            # basic-auth (htpasswd bcrypt). Registry is reachable via the public
            # IP NAT, so anonymous push/pull MUST be off.
            - { name: REGISTRY_AUTH, value: htpasswd }
            - { name: REGISTRY_AUTH_HTPASSWD_REALM, value: gt-registry }
            - { name: REGISTRY_AUTH_HTPASSWD_PATH, value: /auth/htpasswd }
          volumeMounts:
            - { name: data, mountPath: /var/lib/registry }
            - { name: auth, mountPath: /auth, readOnly: true }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: registry-data }
        - name: auth
          secret: { secretName: registry-auth }
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: dev-registry
spec:
  type: NodePort
  selector: { app: registry }
  ports:
    - { port: 5000, targetPort: 5000, nodePort: 30500 }
