deployment:
  kind: Deployment
certificatesResolvers:
  netlify:
    acme:
      email: codecsrayo@gmail.com
      storage: /data/acme.json
      dnsChallenge:
        provider: netlify
persistence:
  enabled: true
  size: 128Mi
  storageClassName: local-path
  path: /data
env:
  - name: NETLIFY_TOKEN
    valueFrom:
      secretKeyRef:
        name: netlify-creds
        key: NETLIFY_TOKEN
ports:
  web:
    hostPort: 80
  websecure:
    hostPort: 443
service:
  type: ClusterIP
providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
